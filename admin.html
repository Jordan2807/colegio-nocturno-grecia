<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:none;">

    <!-- HEADER -->
    <header>
        <div class="logo-container">
            <img src="Resources/logo.png" alt="Logo Colegio" class="logo">
        </div>

        <nav>
            <a href="index.html#inicio"class=>Inicio</a>
            <a href="index.html#nosotros"class=>Nosotros</a>
            <a href="index.html#contactenos"class= >Contáctenos</a>
            <a href="#" class="btn-aula" onclick="logout()">Cerrar sesión</a>
        </nav>
    </header>
    <main>
        <button id="btnNuevoAdmin" class="btn-nuevo-admin">
        Registrar nuevo administrador
        </button>

        <div class="login-container">
        <div id="panelNuevoAdmin" class="login-box oculto">

        <h2>Registrar Nuevo Administrador</h2>

        <input type="email" id="correoAdmin" placeholder="Correo principal">

        <input type="text" id="cedulaAdmin" placeholder="Cédula">

        <div class="password-container">
        <input type="password" id="password" placeholder="Contraseña">
        <i class="fa-solid fa-eye togglePassword"></i>
        </div>

        <div class="password-container">
        <input type="password" id="confirmPassword" placeholder="Confirmar contraseña">
        <i class="fa-solid fa-eye togglePassword"></i>
        </div>

        <button class="btn-login" onclick="registrarAdmin()" >Crear Administrador</button>

        </div>
        </div>

        <h2 class="titulo-admin">Panel de Administrador</h2>

        <h3 id="tituloSolicitudes" class="titulo-seccion">
        Últimas solicitudes recibidas
        </h3>

        <div id="solicitudes"></div>

        <h3 class="titulo-seccion">
        Lista de profesores
        </h3>

        <div id="usuarios"></div>

        <h3 class="titulo-seccion">
        Lista de administradores
        </h3>

        <div id="admins"></div>


    </main>

<script type="module" src="script.js"></script>

<script type="module">protegerPagina("admin");</script>

    <footer>
        <p>© 2026 Colegio Nocturno de Grecia - Todos los derechos reservados</p>
    </footer>
</body>
