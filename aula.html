<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo-container">
            <img src="Resources/logo.png" alt="Logo Colegio" class="logo">
        </div>

        <nav>
            <a href="index.html#inicio"class=>Inicio</a>
            <a href="index.html#nosotros"class=>Nosotros</a>
            <a href="index.html#contactenos"class= >Contáctenos</a>
            <a href="aula.html"class="btn-aula" >Aula Virtual</a>
        </nav>
    </header>
    <main>
        <main class="login-container">
    
    <div class="login-box">
        <h2>Iniciar sesión</h2>

        <input type="email" id="email" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">

        <div class="login-botones">
            <button class="btn-login" onclick="login()">Ingresar</button>
            <a href="registro.html" class="btn-login">Registrarse</a>
        </div>

    </div>

</main>
    </main>
 <footer>
        <p>© 2026 Colegio Nocturno de Grecia - Todos los derechos reservados</p>
    </footer>
<script src="script.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* CONFIGURACIÓN */
const firebaseConfig = {
  apiKey: "AIzaSyBXHvRtn0tIxKGNYS9drwYhB9OXY8xYkV4",
  authDomain: "aula-virtual-colegio-f3290.firebaseapp.com",
  projectId: "aula-virtual-colegio-f3290",
  storageBucket: "aula-virtual-colegio-f3290.firebasestorage.app",
  messagingSenderId: "686411550211",
  appId: "1:686411550211:web:f9ec664b4a8d1e1067c836",
  measurementId: "G-3RXFB7KELK"
};

/* INICIALIZAR */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async function () {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {

        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // buscar rol en Firestore
        const docRef = doc(db, "usuarios", user.uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {

            const rol = docSnap.data().rol;

            if (rol === "admin") {
                window.location.href = "admin.html";
            }
            else if (rol === "profesor") {
                window.location.href = "profesor.html";
            }
            else {
                alert("Usuario sin rol válido");
            }

        } else {
            alert("Usuario no registrado en base de datos");
        }

    } catch (error) {
        alert("Error: " + error.message);
    }

}
</script>
</body>
</html>
