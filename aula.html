<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo-container">
            <img src="Resources/logo.png" alt="Logo Colegio" class="logo">
        </div>

        <nav>
            <a href="#inicio"class=>Inicio</a>
            <a href="#nosotros"class=>Nosotros</a>
            <a href="#contactenos"class= >Contáctenos</a>
            <a href="#"class="btn-aula" >Aula Virtual</a>
        </nav>
    </header>
    <main>
        <h2>Iniciar sesión</h2>

<input type="email" id="email" placeholder="Correo">
<input type="password" id="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>
    </main>
 <footer>
        <p>© 2026 Colegio Nocturno de Grecia - Todos los derechos reservados</p>
    </footer>
<script src="script.js"></script> 
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* CONFIGURACIÓN */
const firebaseConfig = {
  apiKey: "AIzaSyBXHvRtn0tIxKGNYS9drwYhB9OXY8xYkV4",
  authDomain: "aula-virtual-colegio-f3290.firebaseapp.com",
  projectId: "aula-virtual-colegio-f3290",
  storageBucket: "aula-virtual-colegio-f3290.firebasestorage.app",
  messagingSenderId: "686411550211",
  appId: "1:686411550211:web:f9ec664b4a8d1e1067c836",
  measurementId: "G-3RXFB7KELK"
};

/* INICIALIZAR FIREBASE */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* FUNCIÓN LOGIN */
window.login = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
        alert("Login correcto");

        // roles
        window.location.href = "profesor.html";
    })
    .catch((error) => {
        alert("Error: " + error.message);
    });
}
</script>
</body>
</html>
