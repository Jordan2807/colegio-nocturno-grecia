<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Profesor - Colegio Nocturno de Grecia</title>
    <link rel="icon" type="image/x-icon" href="Resources/favicon.ico">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:none;">

    <!-- HEADER -->
    <header>
        <div class="logo-container">
            <img src="Resources/logo.png" alt="Logo Colegio" class="logo">
        </div>

        <nav>
            <a href="index.html#inicio"class=>Inicio</a>
            <a href="index.html#nosotros"class=>Nosotros</a>
            <a href="index.html#contactenos"class= >Contáctenos</a>
            <a href="#" class="btn-aula" onclick="logout()">Cerrar sesión</a>
        </nav>
    </header>


    

    <main>

    <!-- BOTON MENU -->
    <button onclick="toggleMenu()" id="btnMenu" class="btn-menu">☰</button>

    <!-- MENU LATERAL -->
    <div id="sidebar" class="sidebar">

    <h2>Profesor</h2>

    <button onclick="mostrarPerfil()">Editar Perfil</button>
    <button onclick="mostrarSecciones()">Secciones</button>
    <!-- Botón de Admin (oculto por defecto) -->
    <button id="btnAdminPanel" onclick="irAAdmin()" style="display: none;"> Panel Admin</button>

    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="contenido">

     <h2 class="titulo-admin">Panel de Profesor</h2>
        
    <!-- PERFIL -->
    <div id="perfil" class="login-container oculto">
    <div class="login-box">

    <h2>Editar Perfil</h2>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="cedula" placeholder="Cédula">
    <input type="text" id="materia" placeholder="Materia">
    <input type="email" id="correo" placeholder="Correo electrónico">

    <div class="password-container">
        <input type="password" id="password" placeholder="Nueva contraseña">
        <i class="fa-solid fa-eye togglePassword"></i>
        </div>

        <div class="password-container">
        <input type="password" id="confirmPassword" placeholder="Confirmar nueva contraseña">
        <i class="fa-solid fa-eye togglePassword"></i>
        </div>

    <button onclick="guardarPerfil()" class="btn-login">Guardar</button>

    </div>
    </div>
    

    <!-- SECCIONES -->
    <div id="secciones" class="seccion">

    <h2>Secciones</h2>

    <div class="crear-seccion">

    <input type="text" id="nombreSeccion" placeholder="Nombre sección">
    <button class="btn-login" onclick="crearSeccion()">Crear Sección</button>

    </div>

    <div id="listaSecciones" class="tarjetas"></div>

    </div>


    <!-- ARCHIVOS -->
    <!-- ARCHIVOS -->
<div id="archivos" class="seccion oculto">
    <button class="btn-volver" onclick="volverASecciones()">
        <i class="fa-solid fa-arrow-left"></i> Volver a secciones
    </button>
    <h2 id="tituloSeccion"></h2>
    <button onclick="seleccionarYSubirArchivo()" class="btn-seleccionar-archivo">
        <i class="fa-solid fa-cloud-upload-alt"></i> Seleccionar archivo
    </button>
    <div id="listaArchivos"></div>
</div>
    
    </div>


    </main>
    
<script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
<script type="module" src="js/profesor.js"></script>
 <footer>
        <p>© 2026 Colegio Nocturno de Grecia - Todos los derechos reservados</p>
    </footer>

    <!-- LOADER GLOBAL -->
<div id="globalLoader" class="global-loader oculto">
    <div class="loader-content">
        <i class="fa-solid fa-spinner fa-spin fa-3x"></i>
        <p>Cargando...</p>
    </div>
</div>
</body>
</html>
