<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrarse - Colegio Nocturno de Grecia</title>
    <link rel="icon" type="image/x-icon" href="Resources/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo-container">
            <img src="Resources/logo.png" alt="Logo Colegio" class="logo">
        </div>

        <nav>
            <a href="index.html#inicio"class=>Inicio</a>
            <a href="index.html#nosotros"class=>Nosotros</a>
            <a href="index.html#contactenos"class= >Contáctenos</a>
            <a href="aula.html"class="btn-aula" >Aula Virtual</a>
        </nav>
    </header>
<main>

<div class="login-container">   
<div class="login-box">

<h2>Registro Profesor</h2>

<input type="text" id="nombre" placeholder="Nombre completo">
<input type="text" id="cedula" placeholder="Cédula">
<input type="text" id="materia" placeholder="Materia">
<input type="text" id="correo" placeholder="Correo electrónico">

<div class="password-container">
<input type="password" id="password" placeholder="Contraseña">
<i class="fa-solid fa-eye togglePassword"></i>
</div>

<div class="password-container">
<input type="password" id="confirmPassword" placeholder="Confirmar contraseña">
<i class="fa-solid fa-eye togglePassword"></i>
</div>
 
<button class="btn-login" onclick="registrar()">Registrarse</button>
</div>
</div>
</main>

 <footer>
        <p>© 2026 Colegio Nocturno de Grecia - Todos los derechos reservados</p>
    </footer>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/public.js"></script>

</body>
</html>
